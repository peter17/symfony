framework:
    http_client:
        default_options: ~
        mock_response_factory: true
        scoped_clients:
            notMocked:
                base_uri : https://symfony.com
                mock_response_factory: false
            mocked:
                base_uri: https://symfony.com
            mocked_with_factory:
                base_uri: https://symfony.com
                mock_response_factory: 'my_response_factory'
